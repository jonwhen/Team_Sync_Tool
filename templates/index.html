<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Sync Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
  <!-- Name prompt overlay -->
  <div id="name-overlay" class="name-overlay">
    <div class="name-card">
      <h2 class="text-lg font-bold mb-2">Welcome to Team Sync</h2>
      <p class="text-gray-500 text-sm mb-4">Enter your name to join the meeting.</p>
      <form id="name-form" class="flex gap-2">
        <input
          type="text"
          id="name-input"
          class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
          placeholder="Your name"
          required
        >
        <button
          type="submit"
          class="px-4 py-1.5 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors cursor-pointer"
        >Join</button>
      </form>
    </div>
  </div>

  <!-- Main app (hidden until name is entered) -->
  <div id="app" class="app-layout" style="display:none">
    <header class="text-center mb-6">
      <h1 class="text-2xl font-bold">Team Sync Tool</h1>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-btn-meeting">Meeting</button>
        <button class="tab-btn" id="tab-btn-board">Project Board</button>
      </div>
      <div class="meeting-selector">
        <select id="meeting-select"></select>
      </div>
    </header>

    <!-- Fixed top-right timer -->
    <div class="timer-fixed" id="timer-container">
      <span id="timer-display" class="timer-display-idle">60:00</span>
      <button class="timer-btn-start" id="timer-start-btn">Start Meeting</button>
      <button class="timer-btn-extend" id="timer-extend-btn" style="display:none">+15m</button>
      <button class="timer-btn-end" id="timer-end-btn" style="display:none">End</button>
    </div>

    <div id="tab-meeting">

      <!-- Attendees bar -->
      <div class="attendees-bar">
        <span class="attendees-label">Attendees:</span>
        <div id="attendees-list"></div>
      </div>

      <!-- 3-column meeting layout -->
      <div class="meeting-grid">
        <!-- Left column: Resources -->
        <section class="resources-card bg-white rounded-xl shadow-md p-6">
          <div class="flex justify-between items-center mb-3">
            <h2 class="text-sm font-semibold text-gray-600">Resources</h2>
            <button
              class="px-2 py-1 text-xs text-red-500 hover:text-red-700 hover:bg-red-50 rounded transition-colors cursor-pointer"
              id="clear-resources-btn"
            >Clear</button>
          </div>
          <div class="flex gap-2 mb-2">
            <input
              type="text"
              id="resource-title-input"
              class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
              placeholder="Title or description..."
            >
          </div>
          <div class="flex gap-2 mb-4">
            <input
              type="text"
              id="resource-url-input"
              class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
              placeholder="URL (optional)"
            >
            <button
              class="px-4 py-1.5 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors cursor-pointer"
              id="add-resource-btn"
            >Add</button>
          </div>
          <div class="resources-list-scroll">
            <div id="resources-list"></div>
          </div>
        </section>

        <!-- Center column: Agenda (top) + Action Items (bottom) -->
        <div class="center-column">
          <main class="agenda-card bg-white rounded-xl shadow-md p-6">
            <div class="flex justify-between items-center mb-3">
              <h2 class="text-sm font-semibold text-gray-600">Agenda</h2>
              <button
                class="px-2 py-1 text-xs text-red-500 hover:text-red-700 hover:bg-red-50 rounded transition-colors cursor-pointer"
                id="clear-agenda-btn"
              >Clear</button>
            </div>
            <div class="flex gap-2 mb-4" id="agenda-input-row">
              <input
                type="text"
                id="agenda-input"
                class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
                placeholder="Add an agenda item..."
              >
              <button
                class="px-4 py-1.5 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors cursor-pointer"
                id="add-btn"
              >Add</button>
            </div>
            <p class="text-center text-gray-400 italic py-6 text-sm" id="empty-msg">No agenda items yet. Add one above.</p>
            <div class="agenda-list-scroll">
              <ol class="list-none p-0" id="agenda-list"></ol>
            </div>
          </main>

          <div class="shoutouts-card bg-white rounded-xl shadow-md p-6">
            <div class="flex justify-between items-center mb-3">
              <h2 class="text-sm font-semibold text-gray-600">Wins & Shoutouts</h2>
              <button
                class="px-2 py-1 text-xs text-red-500 hover:text-red-700 hover:bg-red-50 rounded transition-colors cursor-pointer"
                id="clear-shoutouts-btn"
              >Clear</button>
            </div>
            <div class="flex gap-2 mb-4">
              <input
                type="text"
                id="shoutout-input"
                class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
                placeholder="Share a win or shoutout a teammate..."
              >
              <button
                class="px-4 py-1.5 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors cursor-pointer"
                id="add-shoutout-btn"
              >Post</button>
            </div>
            <div class="shoutouts-list-scroll">
              <div id="shoutouts-list"></div>
            </div>
          </div>
        </div>

        <!-- Right column: Meeting Notes -->
        <section class="notes-card bg-white rounded-xl shadow-md p-6">
          <div class="flex justify-between items-center mb-3">
            <h2 class="text-sm font-semibold text-gray-600">Meeting Notes</h2>
            <button
              class="px-2 py-1 text-xs text-red-500 hover:text-red-700 hover:bg-red-50 rounded transition-colors cursor-pointer"
              id="clear-notes-btn"
            >Clear</button>
          </div>
          <div id="notes-list" class="notes-list"></div>
          <div class="flex gap-2 mt-3">
            <input
              type="text"
              id="note-input"
              class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
              placeholder="Add a note..."
            >
            <button
              class="px-4 py-1.5 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors cursor-pointer"
              id="send-note-btn"
            >Send</button>
          </div>
        </section>
      </div>
    </div>

    <div id="tab-board" style="display:none">
      <section class="board-section">
        <div class="board-header">
          <div class="flex gap-2">
            <input
              type="text"
              id="board-card-input"
              class="flex-1 px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
              placeholder="New card title..."
            >
            <input
              type="date"
              id="board-card-eta"
              class="px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
            >
            <button
              class="px-4 py-1.5 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600 transition-colors cursor-pointer"
              id="add-card-btn"
            >Add Card</button>
          </div>
        </div>
        <div class="board-columns">
          <div class="board-column" data-column="todo">
            <div class="board-column-header todo">To Do</div>
            <div class="board-column-cards"></div>
          </div>
          <div class="board-column" data-column="in_progress">
            <div class="board-column-header in-progress">In Progress</div>
            <div class="board-column-cards"></div>
          </div>
          <div class="board-column" data-column="done">
            <div class="board-column-header done">Done</div>
            <div class="board-column-cards"></div>
          </div>
          <div class="board-column" data-column="in_review">
            <div class="board-column-header in-review">In Review</div>
            <div class="board-column-cards"></div>
          </div>
          <div class="board-column" data-column="blocked">
            <div class="board-column-header blocked">Blocked</div>
            <div class="board-column-cards"></div>
          </div>
          <div class="board-column" data-column="parking_lot">
            <div class="board-column-header parking-lot">Parking Lot</div>
            <div class="board-column-cards"></div>
          </div>
        </div>
      </section>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
